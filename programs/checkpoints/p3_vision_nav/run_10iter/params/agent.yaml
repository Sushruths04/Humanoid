seed: 42
device: cuda:0
num_steps_per_env: 48
max_iterations: 10
empirical_normalization: {}
obs_groups:
  actor:
  - policy
  - images
  critic:
  - policy
  - images
clip_actions: null
check_for_nan: true
save_interval: 5
experiment_name: g1_vision_nav
run_name: ''
logger: tensorboard
neptune_project: isaaclab
wandb_project: isaaclab
resume: false
load_run: .*
load_checkpoint: model_.*.pt
class_name: OnPolicyRunner
actor:
  class_name: CNNModel
  hidden_dims:
  - 512
  - 256
  - 128
  activation: elu
  obs_normalization: true
  distribution_cfg:
    class_name: GaussianDistribution
    init_std: 1.0
    std_type: log
  cnn_cfg:
    output_channels:
    - 32
    - 64
    - 64
    kernel_size:
    - 8
    - 4
    - 3
    stride:
    - 4
    - 2
    - 1
    dilation: 1
    padding: none
    norm: none
    activation: relu
    max_pool: false
    global_pool: none
    flatten: true
critic:
  class_name: CNNModel
  hidden_dims:
  - 512
  - 256
  - 128
  activation: elu
  obs_normalization: true
  distribution_cfg: null
  cnn_cfg:
    output_channels:
    - 32
    - 64
    - 64
    kernel_size:
    - 8
    - 4
    - 3
    stride:
    - 4
    - 2
    - 1
    dilation: 1
    padding: none
    norm: none
    activation: relu
    max_pool: false
    global_pool: none
    flatten: true
algorithm:
  class_name: PPO
  num_learning_epochs: 5
  num_mini_batches: 64
  learning_rate: 0.0003
  schedule: adaptive
  gamma: 0.99
  lam: 0.95
  entropy_coef: 0.008
  desired_kl: 0.01
  max_grad_norm: 1.0
  optimizer: adam
  value_loss_coef: 1.0
  use_clipped_value_loss: true
  clip_param: 0.2
  normalize_advantage_per_mini_batch: false
  share_cnn_encoders: true
  rnd_cfg: null
  symmetry_cfg: null
policy: {}
