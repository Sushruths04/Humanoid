# Lightning AI / local-GPU runner. Reuses the EXISTING humanoid-isaaclab image
# (same system, different task) — no separate image. `docker compose run wakeboard <cmd>`.
# Code is mounted, so edits take effect with no rebuild.
services:
  wakeboard:
    image: ghcr.io/sushruths04/humanoid-isaaclab:latest   # the one shared image
    # If rsl-rl is missing from the base, uncomment to layer it in (see docker/Dockerfile):
    # build:
    #   context: ..
    #   dockerfile: docker/Dockerfile
    # The image's default ENTRYPOINT is /isaac-sim/runheadless.sh (launches the STREAMING app and
    # swallows our command). Override it: make bare `python` the kit python3, export the Isaac env
    # vars that AppLauncher needs (EXP_PATH, ISAAC_PATH), source the python env (PYTHONPATH/LD_LIB),
    # then exec our actual command. ($$@ -> $@ at runtime so docker-compose doesn't interpolate it.)
    entrypoint:
      - /bin/bash
      - -c
      - 'ln -sf /isaac-sim/kit/python/bin/python3 /usr/local/bin/python; export ISAAC_PATH=/isaac-sim EXP_PATH=/isaac-sim/apps CARB_APP_PATH=/isaac-sim/kit LD_PRELOAD=/isaac-sim/kit/libcarb.so RESOURCE_NAME=IsaacSim; source /isaac-sim/setup_python_env.sh; exec "$$@"'
      - --
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility, graphics, video]
    environment:
      - NVIDIA_DRIVER_CAPABILITIES=all
      - NVIDIA_VISIBLE_DEVICES=all
      # Isaac Sim refuses to start without these — confirmed by the import hitting the EULA gate.
      - ACCEPT_EULA=Y
      - OMNI_KIT_ACCEPT_EULA=YES
      - PYTHONUNBUFFERED=1          # stream train.py stdout live (no buffered silence)
      - WANDB_API_KEY=${WANDB_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - ../../wakeboarding-experiment:/workspace/wakeboarding-experiment   # code (live)
      - wb-ckpts:/workspace/wakeboarding-experiment/checkpoints            # persist ckpts
      - hf-cache:/root/.cache/huggingface
    working_dir: /workspace/wakeboarding-experiment
    shm_size: "8gb"
    stdin_open: true
    tty: true

volumes:
  wb-ckpts:
  hf-cache:
