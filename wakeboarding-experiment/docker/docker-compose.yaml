# Lightning AI / local-GPU runner. Reuses the EXISTING humanoid-isaaclab image
# (same system, different task) — no separate image. `docker compose run wakeboard <cmd>`.
# Code is mounted, so edits take effect with no rebuild.
services:
  wakeboard:
    image: ghcr.io/sushruths04/humanoid-isaaclab:latest   # the one shared image
    # If rsl-rl is missing from the base, uncomment to layer it in (see docker/Dockerfile):
    # build:
    #   context: ..
    #   dockerfile: docker/Dockerfile
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility, graphics, video]
    environment:
      - NVIDIA_DRIVER_CAPABILITIES=all
      - NVIDIA_VISIBLE_DEVICES=all
      - WANDB_API_KEY=${WANDB_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - ../../wakeboarding-experiment:/workspace/wakeboarding-experiment   # code (live)
      - wb-ckpts:/workspace/wakeboarding-experiment/checkpoints            # persist ckpts
      - hf-cache:/root/.cache/huggingface
    working_dir: /workspace/wakeboarding-experiment
    shm_size: "8gb"
    stdin_open: true
    tty: true

volumes:
  wb-ckpts:
  hf-cache:
