# Stage I — first real training run after reward-weight wiring fix confirmed.
# 5000 iterations, 16 envs (L4 stable), proven reward balance.
seed: 0
num_envs: 16
max_iterations: 200
save_interval: 50
experiment_name: wakeboard_stage1
rope: {model: "spring", v_pull_kmh: 10.0, k_p: 800.0, k_d: 50.0, f_max: 600.0}
curriculum: {enabled: false}
board: {length: 1.4, width: 0.4, mass: 3.0, sand_friction: 0.4}
dr: {enabled: false}
rewards:
  pose_tracking: 8.0
  pelvis_height_target: 4.0
  pelvis_height: 10.0
  height_progress: 1.5
  uprightness: 10.0
  survival: 2.5
  forward_glide: 5.0
  success_bonus: 50.0
  board_positive_angle: 7.5
  arms_straight: 1.0
  handle_at_hips: 0.8
  lean_back_moderate: 0.7
  knee_bend_maintained: 4.0
  amp_style: 0.0
  pen_stand_too_fast: -0.2
  pen_pull_against_rope: -0.2
  pen_torque: -2.0e-6
  pen_action_rate: -0.0002
  pen_action_accel: -2.0e-5
  pen_dof_pos_limits: -1.0
  pen_fall: -20.0
ppo:
  policy_hidden: [256, 256]
  activation: elu
  clip_param: 0.2
  entropy_coef: 0.005
  learning_rate: 5.0e-4
  schedule: adaptive
  desired_kl: 0.01
  gamma: 0.99
  lam: 0.95
  num_learning_epochs: 5
  num_mini_batches: 4
  num_steps_per_env: 24
